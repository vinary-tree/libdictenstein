\* OVERLAY-EVICTION + FAULT-IN driver, correct design: eviction is UNRESTRICTED
\* (may evict ANY linked node) and `FaultInCas` recovers an evicted durable node
\* on a later read/write (USE_FAULT_IN = TRUE). ALL FIVE safety invariants hold —
\* NoLostAck (loser-safe root CAS never drops an acked write), FaultEqualsDurable
\* (fault-in never corrupts/loses durable identity = the §2 round-trip
\* equivalence), ReadNeverMissesCommitted (every committed node is reachable OR
\* recoverable from the durable image — REPLACES the old cold-only
\* EvictTouchesOnlyCold obligation), ReachableNotFreed (no use-after-free).
\* CONSTANTS per design §7: Nodes = {n1,n2,n3}, Lsns = {1,2}, live = {n1},
\* cold = {n2,n3}.
CONSTANTS
    Nodes = {n1, n2, n3}
    Lsns = {1, 2}
    live = {n1}
    cold = {n2, n3}
    USE_FAULT_IN = TRUE
    MaxRoot = 6

SPECIFICATION Spec

CONSTRAINT RootBound

INVARIANT TypeInvariant
INVARIANT NoLostAck
INVARIANT FaultEqualsDurable
INVARIANT ReadNeverMissesCommitted
INVARIANT ReachableNotFreed
INVARIANT LinkedAndOnDiskDisjoint

CHECK_DEADLOCK FALSE
