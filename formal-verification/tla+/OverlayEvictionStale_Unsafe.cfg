\* NEGATIVE control (1c overwrite race): the stamp guard is DROPPED (USE_GUARD =
\* FALSE), so `Evict` may fire on a node that was OVERWRITTEN since its checkpoint
\* (durableVersion < liveVersion), unswizzling the NEWER live value's slot onto the
\* OLDER on-disk image. TLC MUST report `NoStaleEvict` VIOLATED — the concrete
\* round-3 lost update (acked at v2, but the on-disk image the slot now names is v1).
\* Reachable trace: Write(n)->v1 acked ; Checkpoint(n)->durable v1 ; Write(n)->v2
\* acked (re-write, the overwrite) ; Evict(n) UNGUARDED -> evictedTo = durable = v1
\* != acked v2, n unlinked -> NoStaleEvict false. If TLC PASSES, the model no longer
\* exhibits the bug it must catch -> the formal gate fails. (Mirrors the Rust OE5
\* witness `oe5_overwrite_since_checkpoint_is_not_evicted_to_stale_image`.)
\*
\* Only the invariant the unsafe relaxation breaks is asserted (mirrors the
\* OverlayEvictionCas_Unsafe.cfg convention of checking just the firing invariant).
CONSTANTS
    Nodes = {n1, n2}
    USE_GUARD = FALSE
    MaxVer = 3
    MaxRoot = 6

SPECIFICATION Spec

CONSTRAINT RootBound

INVARIANT TypeInvariant
INVARIANT NoStaleEvict

CHECK_DEADLOCK FALSE
