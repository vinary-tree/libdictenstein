\* TLC Configuration for PART (Persistent Adaptive Radix Trie)
\* Basic configuration for model checking

CONSTANTS
    \* Number of concurrent threads
    NumThreads = 3

    \* Maximum number of keys in the model
    MaxKeys = 4

    \* Maximum key length
    MaxKeyLength = 3

    \* Maximum LSN (bounded for model checking)
    MaxLSN = 15

    \* Maximum epoch number
    MaxEpoch = 3

    \* Maximum transaction ID
    MaxTxId = 10

    \* Enable crash modeling
    EnableCrash = FALSE

    \* Epoch configuration
    MaxOpsPerEpoch = 5
    MaxWalSizePerEpoch = 10
    RetentionEpochs = 2
    BackgroundCheckpoint = TRUE
    IncrementalCheckpoint = TRUE

    \* Abstract sets for model checking
    \* NodeIds - use model values for better state space exploration
    NodeIds = {1, 2, 3, 4, 5, 6, 7, 8}

    \* Keys - use simple abstract keys
    Keys = {"a", "ab", "abc", "b"}

    \* Values - use simple string values (must match Null type)
    Values = {"v1", "v2", "v3"}

    \* Null value - use a unique string not in Keys or Values
    Null = "NULL"

SPECIFICATION Spec

\* Safety invariants to check
INVARIANT CombinedSafetyInvariant

\* Uncomment to check liveness (requires longer runs)
\* PROPERTY PROPERTY_Liveness

\* Check specific properties
CHECK_DEADLOCK TRUE
