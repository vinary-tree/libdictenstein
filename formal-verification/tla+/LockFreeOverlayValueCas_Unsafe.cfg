\* NEGATIVE control (C2 conditional/recomputed value write): the "forgot to burn" bug is
\* enabled (USE_BURN_ON_LOSS = FALSE). A refused write's already-durable Upsert record is
\* RANKED instead of burned; appended after the winner, it is the value an Overlay-regime
\* reopen reconstructs, so `recov` diverges from the live `committed` — recovery
\* resurrects a value the caller was told Ok(false) (the append-before-failed-CAS
\* phantom). TLC MUST report a violation of NoPhantomConditionalWrite. This proves the
\* `mark_committed_burned` (UNRANKED) choice is REQUIRED: only leaving a refused write
\* unranked (dropped on reopen) keeps the conditional write phantom-free. If TLC PASSES
\* this configuration, the negative control is broken -> the whole gate fails.
\*
\* Only the invariant the unsafe relaxation breaks is asserted (with the type invariant),
\* mirroring the RemoveCas / OverlayEvictionCas / LockFreeDurableCheckpoint _Unsafe.cfg
\* convention of checking just the sharp obligation the negative control must fire on.
CONSTANTS
    Terms = {a, b}
    Vals = {1, 2}
    USE_BURN_ON_LOSS = FALSE

SPECIFICATION Spec

INVARIANT TypeInvariant
INVARIANT NoPhantomConditionalWrite

CHECK_DEADLOCK FALSE
