\* NEGATIVE control: NO checkpoint_lock (USE_LOCK = FALSE). TLC MUST report a
\* NoTornDescriptor violation — the losing trace is two concurrent checkpoints
\* interleaving their block-0 descriptor writes, leaving the persisted descriptor
\* with fields from DIFFERENT generations (a torn descriptor → lost/corrupt terms
\* on reopen, the NF-3 data loss). This proves the checkpoint_lock is REQUIRED:
\* if TLC ever PASSES this cfg, the model no longer exhibits the race the lock must
\* prevent → the negative control is broken → fail the gate.
CONSTANTS
    Checkpointers = {c1, c2}
    USE_LOCK = FALSE

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT NoTornDescriptor

CHECK_DEADLOCK FALSE
