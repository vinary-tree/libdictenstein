\* Configuration to demonstrate the sequential siblings bug
\* TLC will find a counterexample showing how the buggy encode/decode
\* produces invalid slot IDs that exceed arena bounds.
\*
\* Expected result: TLC finds a trace where:
\* 1. Init establishes some arena_node_count (e.g., 5)
\* 2. first_child_slot is near arena end (e.g., 4)
\* 3. child_count > 1 (e.g., 3)
\* 4. EncodeBuggy accepts this (no bounds check)
\* 5. DecodeBuggy generates slots [4, 5, 6]
\* 6. Slots 5 and 6 violate DecodedSlotsValid (>= arena_node_count of 5)

SPECIFICATION SpecBuggy

CONSTANTS
    MaxSlotId = 15
    MaxChildCount = 5
    MaxArenaNodes = 8
    MaxSteps = 5

INVARIANT TypeInvariant
INVARIANT SafetyInvariant
