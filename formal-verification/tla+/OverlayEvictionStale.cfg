\* 1c OVERWRITE-RACE GUARD — correct design (USE_GUARD = TRUE). Eviction fires only
\* when the live node still equals its durable image (durableVersion = liveVersion),
\* so an acknowledged write is NEVER replaced on disk by a stale image. The M-2a
\* `serial_disk_ptr` stamp guard in `evict_overlay_node_at_path`. NoStaleEvict holds.
\* CONSTANTS: 2 nodes, value-version cap 3 (need v2 to express an overwrite-since-
\* checkpoint), root cap 6 (Write+Checkpoint+Write+Evict+FaultIn churn fits).
CONSTANTS
    Nodes = {n1, n2}
    USE_GUARD = TRUE
    MaxVer = 3
    MaxRoot = 6

SPECIFICATION Spec

CONSTRAINT RootBound

INVARIANT TypeInvariant
INVARIANT NoStaleEvict
INVARIANT LinkedAndOnDiskDisjoint

CHECK_DEADLOCK FALSE
