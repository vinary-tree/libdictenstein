\* TLC Configuration for PART with Crash Recovery
\* This configuration enables crash modeling for testing recovery

CONSTANTS
    \* Number of concurrent threads
    NumThreads = 2

    \* Maximum number of keys (reduced for state space)
    MaxKeys = 3

    \* Maximum key length
    MaxKeyLength = 3

    \* Maximum LSN (bounded for model checking)
    MaxLSN = 12

    \* Maximum epoch number
    MaxEpoch = 3

    \* Maximum transaction ID
    MaxTxId = 8

    \* Enable crash modeling
    EnableCrash = TRUE

    \* Epoch configuration
    MaxOpsPerEpoch = 4
    MaxWalSizePerEpoch = 8
    RetentionEpochs = 1
    BackgroundCheckpoint = TRUE
    IncrementalCheckpoint = TRUE

    \* Abstract sets for model checking (smaller for crash testing)
    NodeIds = {1, 2, 3, 4, 5, 6}
    Keys = {"x", "xy", "z"}
    Values = {"v1", "v2"}

    \* Null value - use a unique string not in Keys or Values
    Null = "NULL"

SPECIFICATION Spec

\* Safety invariants to check
INVARIANT CombinedSafetyInvariant

\* Crash recovery specific property
PROPERTY PROPERTY_CrashRecovery

\* Check for deadlocks (important with crash recovery)
CHECK_DEADLOCK TRUE
