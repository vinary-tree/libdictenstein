\* NEGATIVE control (Order-A durable replay-order fix, design C′): recovery
\* reconciles by LSN/physical order (USE_COMMIT_RANK = FALSE) — the BROKEN
\* pre-fix scheme that trusts WAL append order. The s019 interleaving is
\* reachable: Append(Insert) gets the LOWER lsn, Append(Remove) the HIGHER lsn,
\* then CommitCas(Remove) wins its CAS FIRST and CommitCas(Insert) wins LAST, so
\* the committed-visible state is PRESENT (the Insert is the CAS last-writer) but
\* lsn-order replay keeps the higher-LSN Remove ⇒ reconstructed ABSENT. Hence
\* `replayed # present` and TLC MUST report a violation of
\* `ReplayEqualsCommittedVisible` (the headline biconditional). This proves the
\* design's commit-generation reconcile (USE_COMMIT_RANK = TRUE) is REQUIRED —
\* only ordering replay by the durable commit generation reconstructs the
\* committed-visible membership. If TLC PASSES this configuration, the negative
\* control is broken (the model no longer exhibits the s019 loss) -> the whole
\* gate fails.
\*
\* Only the invariant the unsafe relaxation breaks is asserted alongside the type
\* invariant (mirrors the LockFreeOverlayRemoveCas_Unsafe.cfg / OverlayEvictionCas_
\* Unsafe.cfg convention of checking just the sharp obligation the control fires
\* on).
CONSTANTS
    Terms = {a, b}
    USE_COMMIT_RANK = FALSE
    MaxOps = 4

SPECIFICATION Spec

CONSTRAINT OpBound

INVARIANT TypeInvariant
INVARIANT ReplayEqualsCommittedVisible

CHECK_DEADLOCK FALSE
