CONSTANTS
    Terms = {"alpha", "beta"}
    Nodes = {"n0", "n1", "n2"}
    MaxIndex = 2
    None = None

SPECIFICATION Spec

INVARIANT TypeInvariant
INVARIANT ReverseIndexMatchesStableTermIndex
INVARIANT IndexesAreUnique
INVARIANT NodeMapPointsOnlyToLiveOwnedNodes
INVARIANT NoStaleMapEntriesToDiskOrDroppedNodes
INVARIANT NoNodeMapAliasing
INVARIANT ReverseCacheConsistentWithReverseIndex
INVARIANT ForwardObservationsAreStable
INVARIANT ReverseObservationsAreStable

CHECK_DEADLOCK FALSE
