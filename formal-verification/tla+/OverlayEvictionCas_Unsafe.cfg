\* NEGATIVE control (overlay-eviction + fault-in): fault-in is DISABLED
\* (USE_FAULT_IN = FALSE) but eviction remains UNRESTRICTED — `EvictCas` is
\* permitted to fire on a LIVE node, and there is NO `FaultInCas` to recover it.
\* TLC MUST report a violation of `ReadNeverMissesCommitted`: a LIVE acked node
\* faulted out is no longer reachable through the published root NOR present in
\* the durable image (only the pre-checkpointed COLD set is durable) -> it is
\* permanently unreachable = silent data loss. This proves fault-in is REQUIRED
\* once eviction is unrestricted: with the cold-only gate removed (the relaxation
\* the design makes), the ONLY thing that keeps a re-touchable evicted node
\* recoverable is the fault-in path. If TLC PASSES this configuration, the
\* negative control is broken (the model no longer exhibits the bug it must
\* catch) -> the whole gate fails.
\*
\* Only the invariant the unsafe relaxation breaks is asserted alongside the type
\* invariant (mirrors the base `LockFreeDurableCheckpoint_Unsafe.cfg` convention
\* of checking just the invariant the negative control must fire on). NoLostAck
\* is intentionally NOT asserted here: it is satisfied vacuously in many traces
\* (an evicted acked LIVE node can still be pinned by a reader snapshot), whereas
\* ReadNeverMissesCommitted is the sharp obligation that an evicted-and-dropped
\* acked node with no fault-in is permanently lost.
CONSTANTS
    Nodes = {n1, n2, n3}
    Lsns = {1, 2}
    live = {n1}
    cold = {n2, n3}
    USE_FAULT_IN = FALSE
    MaxRoot = 6

SPECIFICATION Spec

CONSTRAINT RootBound

INVARIANT TypeInvariant
INVARIANT ReadNeverMissesCommitted

CHECK_DEADLOCK FALSE
