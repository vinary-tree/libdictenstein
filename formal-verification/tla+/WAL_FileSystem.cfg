\* TLC Configuration for WAL_FileSystem.tla
\* Model checks TOCTOU safety for WAL file operations

\* =============================================================================
\* SPECIFICATION
\* =============================================================================

SPECIFICATION WalFsSpec

\* =============================================================================
\* CONSTANTS
\* =============================================================================

CONSTANTS
    \* Set of all paths in the model
    WalPaths = {waldir, walfile}

    \* Directory path
    WalDirPath = waldir

    \* WAL file path
    WalFilePath = walfile

    \* Threads performing WAL operations
    WalThreads = {t1, t2}

    \* Maximum LSN for bounded checking
    WalMaxLsn = 5

    \* Null path constant
    NullWalPath = nullpath

\* =============================================================================
\* INVARIANTS
\* =============================================================================

\* Type invariant
INVARIANT WalFsTypeInvariant

\* Parent directory exists when WAL is open
INVARIANT WalParentDirInvariant

\* File exists when WAL is open
INVARIANT WalFileExistsWhenOpen

\* Safe implementation never fails with ParentNotFound
INVARIANT SafeOpenNoParentError

\* =============================================================================
\* EXPECTED VIOLATION - TOCTOU RACE DEMONSTRATION
\* =============================================================================

\* This invariant is EXPECTED to be violated!
\* It demonstrates that the vulnerable open implementation has a TOCTOU race.
\* Uncomment to verify the race exists:
\* INVARIANT VulnerableOpenNoRace

\* =============================================================================
\* NOTES
\* =============================================================================

\* To run model checking:
\*   cd formal-verification/tla+
\*   tlc -workers 8 WAL_FileSystem.cfg
\*
\* To verify TOCTOU race exists, uncomment VulnerableOpenNoRace invariant
\* and run TLC - it should find a violation showing the race.
