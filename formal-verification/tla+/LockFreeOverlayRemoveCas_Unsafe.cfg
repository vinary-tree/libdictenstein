\* NEGATIVE control (proven overlay DELETE, R-B): the REJECTED in-place
\* `fetch_and(!IS_FINAL)` clear is enabled (USE_FRESH_COPY_CLEAR = FALSE). The
\* clear writes `present` and `removed` to SEPARATE locations with NO atomic
\* coupling and NO root bump (`RemoveInPlaceClearOnly` + `RemoveInPlaceMarkOnly`),
\* and an in-place `fetch_or` insert (`InsertCasInPlace`) can interleave between the
\* two sub-writes. With no root-CAS serialization, `present` and `removed` diverge:
\* either a clear drops `present` before marking `removed` (an inconsistent
\* intermediate / lost remove), or an interleaved insert re-sets `present` while
\* `removed` is set (resurrection). TLC MUST report a violation of `LastWriterWins`
\* (the present⇔not-removed complement). This proves the §3.5 FRESH-COPY-via-root-
\* CAS choice is REQUIRED: only publishing the cleared node atomically through the
\* single root CAS keeps the composite {insert, remove} last-writer-wins. If TLC
\* PASSES this configuration, the negative control is broken (the model no longer
\* exhibits the bug it must catch) -> the whole gate fails.
\*
\* Only the invariant the unsafe relaxation breaks is asserted alongside the type
\* invariant (mirrors the `OverlayEvictionCas_Unsafe.cfg` / `LockFreeDurableCheck-
\* point_Unsafe.cfg` convention of checking just the sharp obligation the negative
\* control must fire on).
CONSTANTS
    Terms = {a, b}
    USE_FRESH_COPY_CLEAR = FALSE
    MaxRoot = 6

SPECIFICATION Spec

CONSTRAINT RootBound

INVARIANT TypeInvariant
INVARIANT LastWriterWins

CHECK_DEADLOCK FALSE
