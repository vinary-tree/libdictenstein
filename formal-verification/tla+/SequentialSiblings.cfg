\* Configuration for SequentialSiblings.tla model checking
\* Verifies that the fixed encode/decode preserves SafetyInvariant
\*
\* This uses the fully fixed specification (SpecFixed) which includes:
\* 1. EncodeFixed: validates first_slot + count - 1 < arena_node_count
\* 2. DecodeFixed: uses checked_add and validates bounds before generating slots
\*
\* Expected result: TLC completes without finding any invariant violations

SPECIFICATION SpecFixed

CONSTANTS
    MaxSlotId = 15
    MaxChildCount = 5
    MaxArenaNodes = 8
    MaxSteps = 5

INVARIANT TypeInvariant
INVARIANT SafetyInvariant

PROPERTY AlwaysSafe
