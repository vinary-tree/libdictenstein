\* ORDER-A DURABLE REPLAY-ORDER FIX (design C′), correct design: recovery
\* reconciles per-term by commit GENERATION (USE_COMMIT_RANK = TRUE), so
\* LSN-ordered-replay membership equals CAS-order committed-visible membership.
\* ALL invariants hold — ReplayEqualsCommittedVisible (replayed ⇔ present, the
\* headline), NoLostNetWrite (present ⇒ replayed, the s019 direction),
\* NoResurrectionOnReplay (¬present ⇒ ¬replayed), and the reused DurablePrefix.
\* Bounded per design §4: Terms = {a, b}, MaxOps = 4 (room for the 2 data + 2
\* rank ops of the s019 single-term interleaving plus a second term).
CONSTANTS
    Terms = {a, b}
    USE_COMMIT_RANK = TRUE
    MaxOps = 4

SPECIFICATION Spec

CONSTRAINT OpBound

INVARIANT TypeInvariant
INVARIANT ReplayEqualsCommittedVisible
INVARIANT NoLostNetWrite
INVARIANT NoResurrectionOnReplay
INVARIANT DurablePrefix

CHECK_DEADLOCK FALSE
