\* PROVEN OVERLAY DELETE (R-B), correct design: the 1→0 clear is published on a
\* FRESH `as_non_final()` node version ONLY via the single root CAS
\* (USE_FRESH_COPY_CLEAR = TRUE), so `present` and `removed` update atomically with
\* one root bump and stay EXACT complements. ALL invariants hold — LastWriterWins
\* (present ⇔ not-removed), NoResurrection (a removed term is present only via a
\* later insert), NoLostOp (every acked op's effect is reflected). Bounded per
\* design §4.4: Terms = {a, b}, MaxRoot = 6.
CONSTANTS
    Terms = {a, b}
    USE_FRESH_COPY_CLEAR = TRUE
    MaxRoot = 6

SPECIFICATION Spec

CONSTRAINT RootBound

INVARIANT TypeInvariant
INVARIANT LastWriterWins
INVARIANT NoResurrection
INVARIANT NoLostOp

CHECK_DEADLOCK FALSE
