# Cargo configuration for libdictenstein.
#
# We enable the minimum CPU features required by transitive dependencies
# (PathMap's gxhash needs AES + SSE2) — NOT `target-cpu=native`. The native
# setting silently invokes AVX2 / AVX-512 / etc. on whatever host the
# build runs on, producing binaries that emit illegal-instruction signals
# when run on slightly older x86_64 hardware. SSE2 is baseline on all
# x86_64 CPUs; AES-NI ships on essentially every Intel/AMD CPU from 2008
# onward.
#
# To rebuild with `target-cpu=native` for local development (release/bench
# profiles benefit measurably on AVX2+ hardware), set the env var:
#
#     RUSTFLAGS="-C target-cpu=native" cargo bench --features persistent-artrie
#
# RUSTFLAGS in the environment overrides this file.

[build]
rustflags = ["-C", "target-feature=+aes,+sse2"]

# Per-target overrides (kept here so future cross-compile fan-out has an
# obvious place to land). The x86_64 GNU/Linux row mirrors `[build]` above.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-feature=+aes,+sse2"]

# Coverage profile for accurate branch coverage with cargo-llvm-cov.
[profile.coverage]
inherits = "dev"
opt-level = 0
debug = true
codegen-units = 1
lto = false
incremental = false
