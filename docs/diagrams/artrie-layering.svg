<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="480px" preserveAspectRatio="none" style="width:972px;height:480px;background:#FFFFFF;" version="1.1" viewBox="0 0 972 480" width="972px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><g class="title" data-source-line="9"><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="257.9336" x="274.9024" y="22.9951">PersistentARTrie &#8212; the lock-free</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="60.6553" x="537.71" y="22.9951">durable</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="87.7803" x="603.2393" y="22.9951">write stack</text></g><!--entity Client--><g class="entity" data-qualified-name="Client" data-source-line="11" id="ent0001"><rect fill="#BBDEFB" height="68.8906" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="320.918" x="523.7" y="236.2269"/><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="77.2051" x="533.7" y="259.222">Client API</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="243.6123" x="533.7" y="275.5189">ARTrie &#183; MutableMappedDictionary</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="300.918" x="533.7" y="291.8157">insert_with_value &#183; upsert &#183; get &#183; iter_prefix</text></g><!--entity Overlay--><g class="entity" data-qualified-name="Overlay" data-source-line="13" id="ent0002"><rect fill="#FFE0B2" height="68.8906" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="435.4473" x="223.43" y="397.1169"/><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="137.334" x="233.43" y="420.112">Lock-free overlay</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="269.2129" x="379.6644" y="420.112">(the *sole* in-memory representation)</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="386.9893" x="233.43" y="436.4089">arc-swap root &#183; adaptive ART nodes (Node4/16/48/256)</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="363.624" x="233.43" y="452.7057">path compression &#183; copy-on-write structural sharing</text></g><!--entity Dur--><g class="entity" data-qualified-name="Dur" data-source-line="15" id="ent0003"><rect fill="#FFCDD2" height="85.1875" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="489.2666" x="132.52" y="58.6669"/><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="163.7959" x="142.52" y="81.662">Durability &#8212; Order-A</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="190.1689" x="310.7661" y="81.662">(data-loss-critical ordering)</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="385.0957" x="142.52" y="97.9589">&#9312; append + fsync WAL record   &#9313; publish via root-CAS</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="469.2666" x="142.52" y="114.2557">&#9314; CommitRank + mark_committed &#8594; committed-prefix watermark</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="221.5186" x="142.52" y="130.5526">epoch-based reclamation (EBR)</text></g><!--entity Store--><g class="entity" data-qualified-name="Store" data-source-line="17" id="ent0004"><rect fill="#CFD8DC" height="68.8906" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="364.3125" x="7" y="236.2269"/><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="108.083" x="17" y="259.222">Block storage</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="344.3125" x="17" y="275.5189">mmap (default)  |  io_uring + O_DIRECT (feature)</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="14" lengthAdjust="spacing" textLength="291.1836" x="17" y="291.8157">256 KB arenas &#183; swizzled (offset) pointers</text></g><g class="entity" data-qualified-name="GMN9" data-source-line="25" id="ent0010"><path d="M656.4,43.2969 L656.4,97.2569 L621.97,101.2569 L656.4,105.2569 L656.4,159.2266 A0,0 0 0 0 656.4,159.2266 L957.922,159.2266 A0,0 0 0 0 957.922,159.2266 L957.922,53.2969 L947.922,43.2969 L656.4,43.2969 A0,0 0 0 0 656.4,43.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M947.922,43.2969 L947.922,53.2969 L957.922,53.2969 L947.922,43.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="189.3379" x="662.4" y="60.3638">acknowledged &#10233; durable</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="250.3198" x="662.4" y="75.4966">a write becomes visible only AFTER its</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="251.7607" x="662.4" y="90.6294">WAL record is fsync-durable (Order-A).</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="250.9292" x="662.4" y="105.7622">Linearization point = the winning CAS.</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="280.522" x="662.4" y="120.895">Watermark is the only safe checkpoint LSN</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="238.6846" x="662.4" y="136.0278">under out-of-order lock-free commit.</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="199.418" x="662.4" y="151.1606">(TLA+ checked: no lost writes)</text></g><!--link Client to Overlay--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="19" id="lnk5"><path d="M632.32,305.5669 C591.21,332.4469 538.1945,367.1101 497.0945,393.9901" fill="none" id="Client-to-Overlay" style="stroke:#37474F;stroke-width:1;"/><polygon fill="#37474F" points="492.91,396.7269,502.6315,395.1484,497.0945,393.9901,498.2528,388.4531,492.91,396.7269" style="stroke:#37474F;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="74.8896" x="585.42" y="355.6838">read / write</text></g><!--link Overlay to Dur--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="20" id="lnk6"><path d="M434.58,396.8469 C422.81,336.4569 399.1268,214.9445 386.2868,149.0845" fill="none" id="Overlay-to-Dur" style="stroke:#37474F;stroke-width:1;"/><polygon fill="#37474F" points="385.33,144.1769,383.1261,153.776,386.2868,149.0845,390.9783,152.2451,385.33,144.1769" style="stroke:#37474F;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="46.979" x="417.56" y="275.2338">publish</text></g><!--link Dur to Store--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="21" id="lnk7"><path d="M330.2,144.0769 C298.33,172.4469 260.4837,206.1512 230.7437,232.6412" fill="none" id="Dur-to-Store" style="stroke:#37474F;stroke-width:1;"/><polygon fill="#37474F" points="227.01,235.9669,236.3911,232.9677,230.7437,232.6412,231.0701,226.9938,227.01,235.9669" style="stroke:#37474F;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="102.2798" x="278.52" y="202.2938">persist &#183; fault-in</text></g><!--link Store to Overlay--><g class="link" data-entity-1="ent0004" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk8"><path d="M194.53,305.5169 C199.46,325.9769 208.76,351.1069 226.16,367.1169 C239.19,379.1069 249.8775,386.642 266.0475,394.542" fill="none" id="Store-to-Overlay" style="stroke:#37474F;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#37474F" points="270.54,396.7369,264.2094,389.1921,266.0475,394.542,260.6976,396.3801,270.54,396.7369" style="stroke:#37474F;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="162.646" x="239.4237" y="348.1838">reopen &#8594; rebuild overlay</text><text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="187.1733" x="227.16" y="363.3166">(dense image + WAL replay)</text></g><?plantuml-src hLHDRzj64BtpLmpaGoG6jDhKJG83AQ1F88XY1xBHN0G8At8eRaNk4hjBgJHwwAdt5BqdxPy8SkrFyI_fMv9s1FKQNIZkphoPz-ODdz2hR_WBdj0xDbPQnygDbhT6CYML4HkPIrUJTIBUdHDDTAuDxRY-H0BH9g-ONb6SIsGDH-zUuqmReRR-DDVnBaeDC-azcrpKr7SPKwOTuONDe84md23s_MWnF2f7j3LSutpZGL0Te5j6_3UbR7TIbSA8WZPWjpMwKabBy6pU_8uY4av5bRkvLkvA54ozAVyYVgxeHYZREueR6QCF7SWFBovUNCm39rtE_rVt_lU_oElnLQOmR2J8EGpfOAJZLlOWC1mxY0gKNXXE6h49OeVXIdLW_twcjvNpkMz5MN8obR6JMWbJhvHKberR7wJBrdlX9uReglI7_j-McmVAcNLfE9M_zaXOwigSZSVJsNnyqiFYTBJek9rkQ3Nw9wcYWWjjQimNe1PGmZSqMA6dEB87KPBHkgai4b4wkMS25r8wOKlzApmkXjy_7rwy73xxyJdIIk4oYdNXqIoGV6QiophIAdeGorInWu8vsKmOgRODaUlEV9ZfxBlninCcqw-cymEvDWcRQ0Gw_KGu4UNQsYW6l8m1g_qjSD7E_OTFv9LM2JsbrDOgzXu6snX1yE_zXx-fh3Qvj1djfMZ8HfFHZS_y1sjK5D8jXTeXkn1cju